<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Config-flow report — {{target_config_path}}</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 1200px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { margin-bottom: .2em; }
    .target { font-family: monospace; color: #555; font-size: .95em; }
    .svg-wrap { background: #fafafa; padding: 1em; border-radius: 6px; border: 1px solid #ddd; overflow: auto; max-height: 700px; margin: 1.5em 0; }
    .svg-wrap svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    .notes { background: #f0f7ff; padding: .75em 1em; border-left: 4px solid #5a8edc; border-radius: 4px; }
    .gate { margin-top: 2em; padding: 1em; background: #fff8e0; border-left: 4px solid #d4a900; border-radius: 4px; }
    .gate code { background: #fff; padding: .15em .4em; border-radius: 3px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Config flow</h1>
  <div class="target">target: {{target_config_path}}</div>

  <div class="svg-wrap">{{new_svg}}</div>

  <div class="notes"><strong>Notes from the extractor:</strong> {{notes}}</div>

  <div class="gate">
    <strong>Resume the parked baton with one of:</strong><br>
    <code>{"decision":"approve"}</code> — lands the SVG<br>
    <code>{"decision":"revise","feedback":"..."}</code> — loops back to the extractor with your feedback
  </div>
</body>
</html>
