<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <rect width="860" height="460" fill="#ffffff"/>
  <text x="40" y="32" font-size="18" font-weight="700" fill="#1a1a1a">agent_loop — three common pipeline shapes</text>
  <text x="40" y="52" font-size="12" fill="#666">agent_loop rarely runs alone. The author composes it with scout / validators / human gates / render to match the use-case.</text>

  <!-- Shape A: One-shot loop -->
  <text x="40" y="100" font-size="13" font-weight="700" fill="#1a1a1a">A — One-shot loop  (bug fix, search/extract)</text>
  <rect x="40" y="118" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="90" y="142" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">input</text>
  <line x1="140" y1="138" x2="180" y2="138" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="180" y="118" width="140" height="40" fill="#eef3f8" stroke="#2c3e50" stroke-width="1.5" rx="3"/>
  <text x="250" y="142" font-size="11" font-family="monospace" font-weight="700" fill="#1a1a1a" text-anchor="middle">agent_loop</text>
  <line x1="320" y1="138" x2="360" y2="138" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="360" y="118" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="410" y="142" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">output</text>
  <text x="470" y="142" font-size="10" fill="#666">small catalog · 8-15 turns · edit/bash perms when destructive</text>

  <!-- Shape B: With scout -->
  <text x="40" y="200" font-size="13" font-weight="700" fill="#1a1a1a">B — Scout-then-act  (refactor, docs refresh, large file edits)</text>
  <rect x="40" y="218" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="90" y="242" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">input</text>
  <line x1="140" y1="238" x2="172" y2="238" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="172" y="218" width="120" height="40" fill="#eef3f8" stroke="#2c3e50" stroke-width="1.5" rx="3"/>
  <text x="232" y="234" font-size="11" font-family="monospace" font-weight="700" fill="#1a1a1a" text-anchor="middle">agent_loop</text>
  <text x="232" y="248" font-size="9" fill="#666" text-anchor="middle">scout (haiku)</text>
  <line x1="292" y1="238" x2="324" y2="238" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="324" y="218" width="120" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="384" y="234" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">transform</text>
  <text x="384" y="248" font-size="9" fill="#666" text-anchor="middle">prefetch (no LLM)</text>
  <line x1="444" y1="238" x2="476" y2="238" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="476" y="218" width="120" height="40" fill="#eef3f8" stroke="#2c3e50" stroke-width="1.5" rx="3"/>
  <text x="536" y="234" font-size="11" font-family="monospace" font-weight="700" fill="#1a1a1a" text-anchor="middle">agent_loop</text>
  <text x="536" y="248" font-size="9" fill="#666" text-anchor="middle">actor (sonnet)</text>
  <line x1="596" y1="238" x2="628" y2="238" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="628" y="218" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="678" y="242" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">output</text>
  <text x="40" y="280" font-size="10" fill="#666">per-stage model selection · scout uses cheap model · actor sees pre-loaded context, fewer turns</text>

  <!-- Shape C: With gate -->
  <text x="40" y="320" font-size="13" font-weight="700" fill="#1a1a1a">C — Loop + validate + gate  (code review, doc generation, security audit)</text>
  <rect x="40" y="338" width="80" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="80" y="362" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">input</text>
  <line x1="120" y1="358" x2="148" y2="358" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="148" y="338" width="120" height="40" fill="#eef3f8" stroke="#2c3e50" stroke-width="1.5" rx="3"/>
  <text x="208" y="362" font-size="11" font-family="monospace" font-weight="700" fill="#1a1a1a" text-anchor="middle">agent_loop</text>
  <line x1="268" y1="358" x2="296" y2="358" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="296" y="338" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="346" y="362" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">json_object</text>
  <line x1="396" y1="358" x2="424" y2="358" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="424" y="338" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="474" y="362" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">human_gate</text>
  <line x1="524" y1="358" x2="552" y2="358" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="552" y="338" width="100" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="602" y="362" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">render</text>
  <line x1="652" y1="358" x2="680" y2="358" stroke="#444" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="680" y="338" width="80" height="40" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="720" y="362" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">output</text>
  <text x="40" y="400" font-size="10" fill="#666">validate structured output · human approves before render · agent_loop's tools are read-only (no destructive perms)</text>

  <!-- footer -->
  <text x="40" y="438" font-size="10" font-style="italic" fill="#999">All three shapes use the SAME agent_loop node. The DAG around it is what varies — that's the YAAH composability story.</text>

</svg>
