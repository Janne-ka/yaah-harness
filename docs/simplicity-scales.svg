    <rect x="416" y="158" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="474" y="178" font-size="11" font-weight="600" fill="#23425f" text-anchor="middle">data-audit</text><text x="474" y="193" font-size="9.5" fill="#7088a3" text-anchor="middle">agent</text>
    <rect x="542" y="158" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="600" y="178" font-size="12" font-weight="600" fill="#23425f" text-anchor="middle">eval</text><text x="600" y="193" font-size="9.5" fill="#7088a3" text-anchor="middle">agent</text>
    <rect x="668" y="158" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="726" y="178" font-size="11" font-weight="600" fill="#23425f" text-anchor="middle">code-review</text><text x="726" y="193" font-size="9.5" fill="#7088a3" text-anchor="middle">agent</text>
    <rect x="794" y="158" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="852" y="178" font-size="11" font-weight="600" fill="#23425f" text-anchor="middle">premise</text><text x="852" y="193" font-size="9.5" fill="#7088a3" text-anchor="middle">agent</text>
  </g>
