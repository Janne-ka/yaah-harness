    <rect x="290" y="274" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="348" y="294" font-size="12" font-weight="600" fill="#23425f" text-anchor="middle">worktree</text><text x="348" y="309" font-size="9.5" fill="#7088a3" text-anchor="middle">worktree</text>
