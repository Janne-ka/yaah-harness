    <rect x="416" y="216" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="474" y="236" font-size="12" font-weight="600" fill="#23425f" text-anchor="middle">sceptic</text><text x="474" y="251" font-size="9.5" fill="#7088a3" text-anchor="middle">agent</text>
    <rect x="542" y="216" width="116" height="46" rx="6" fill="#dce9f7" stroke="#4a78b0"/><text x="600" y="236" font-size="12" font-weight="600" fill="#23425f" text-anchor="middle">get·diff</text><text x="600" y="251" font-size="9.5" fill="#7088a3" text-anchor="middle">get</text>
