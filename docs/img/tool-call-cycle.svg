<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="540" fill="#ffffff"/>
  <text x="40" y="32" font-size="18" font-weight="700" fill="#1a1a1a">One turn of the agent loop</text>
  <text x="40" y="52" font-size="12" fill="#666">Three actors. Loop owns the cycle; provider owns the stream; tool owns the side-effect.</text>

  <!-- Swimlanes -->
  <rect x="40" y="80" width="240" height="430" fill="#f7f9fb" stroke="#cccccc" stroke-width="1" rx="2"/>
  <rect x="280" y="80" width="240" height="430" fill="#ffffff" stroke="#cccccc" stroke-width="1" rx="2"/>
  <rect x="520" y="80" width="240" height="430" fill="#f7f9fb" stroke="#cccccc" stroke-width="1" rx="2"/>

  <text x="160" y="102" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">AGENT_LOOP</text>
  <text x="400" y="102" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">PROVIDER</text>
  <text x="640" y="102" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">TOOL  (fn / node / mcp)</text>

  <!-- lifelines -->
  <line x1="160" y1="115" x2="160" y2="500" stroke="#888" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="400" y1="115" x2="400" y2="500" stroke="#888" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="640" y1="115" x2="640" y2="500" stroke="#888" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- 1. stream call -->
  <line x1="160" y1="140" x2="400" y2="140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="280" y="134" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">stream(messages, tools)</text>

  <!-- 2. text_delta -->
  <line x1="400" y1="180" x2="160" y2="180" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="280" y="174" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">text_delta: "Let me check…"</text>

  <!-- 3. toolcall_end -->
  <line x1="400" y1="216" x2="160" y2="216" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="280" y="210" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">toolcall_end: {id, name, args}</text>

  <!-- 4. done -->
  <line x1="400" y1="248" x2="160" y2="248" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="280" y="242" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">done: stop_reason="tool_use"</text>

  <!-- gap -->
  <rect x="120" y="266" width="80" height="22" fill="#eef3f8" stroke="#2c3e50" stroke-width="1" rx="2"/>
  <text x="160" y="281" font-size="10" font-family="monospace" fill="#1a1a1a" text-anchor="middle">resolve catalog</text>

  <!-- 5. dispatch -->
  <line x1="160" y1="312" x2="640" y2="312" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="400" y="306" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">call_target(target, args)   ← direct, no Comms</text>

  <!-- execution -->
  <rect x="600" y="328" width="80" height="22" fill="#eef3f8" stroke="#2c3e50" stroke-width="1" rx="2"/>
  <text x="640" y="343" font-size="10" font-family="monospace" fill="#1a1a1a" text-anchor="middle">execute</text>

  <!-- 6. tool result back -->
  <line x1="640" y1="374" x2="160" y2="374" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="400" y="368" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">{result | is_error}</text>

  <!-- append + next turn -->
  <rect x="120" y="394" width="80" height="22" fill="#eef3f8" stroke="#2c3e50" stroke-width="1" rx="2"/>
  <text x="160" y="409" font-size="10" font-family="monospace" fill="#1a1a1a" text-anchor="middle">append result</text>

  <!-- 7. next stream -->
  <line x1="160" y1="440" x2="400" y2="440" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="280" y="434" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">stream(messages + result, tools)</text>

  <text x="280" y="464" font-size="11" font-style="italic" fill="#666" text-anchor="middle">… until stop_reason="stop" or max_turns hit</text>

  <text x="40" y="495" font-size="10" fill="#999">Parallel tool calls in one turn → asyncio.gather. Sequential when ANY tool declares execution_mode: "sequential".</text>

</svg>
