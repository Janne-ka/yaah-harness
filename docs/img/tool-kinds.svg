<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="460" fill="#ffffff"/>
  <text x="40" y="32" font-size="18" font-weight="700" fill="#1a1a1a">Three tool kinds, three dispatch paths</text>
  <text x="40" y="52" font-size="12" fill="#666">All resolved through the same call_target. The scheme picks the path. Cost scales accordingly.</text>

  <!-- COLUMN 1: fn: -->
  <rect x="40" y="80" width="230" height="340" fill="#f7f9fb" stroke="#2c3e50" stroke-width="1.5" rx="4"/>
  <text x="155" y="104" font-size="13" font-weight="700" font-family="monospace" fill="#1a1a1a" text-anchor="middle">fn:module:func</text>
  <text x="155" y="122" font-size="11" fill="#666" text-anchor="middle">in-process Python function</text>

  <rect x="60" y="140" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="155" y="162" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">importlib (cached, lru)</text>
  <line x1="155" y1="176" x2="155" y2="196" stroke="#444" stroke-width="1.2" marker-end="url(#arrow3)"/>

  <rect x="60" y="200" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="155" y="222" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">func(args)</text>
  <line x1="155" y1="236" x2="155" y2="256" stroke="#444" stroke-width="1.2" marker-end="url(#arrow3)"/>

  <rect x="60" y="260" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="155" y="282" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">return value</text>

  <rect x="60" y="332" width="190" height="32" fill="#eef3f8" stroke="#2c3e50" stroke-width="1" rx="3"/>
  <text x="155" y="352" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">cost: microseconds</text>
  <text x="155" y="386" font-size="10" fill="#666" text-anchor="middle">no envelope, no Comms</text>
  <text x="155" y="402" font-size="10" fill="#666" text-anchor="middle">use for: read, write, transforms</text>

  <!-- COLUMN 2: node: -->
  <rect x="285" y="80" width="230" height="340" fill="#f7f9fb" stroke="#2c3e50" stroke-width="1.5" rx="4"/>
  <text x="400" y="104" font-size="13" font-weight="700" font-family="monospace" fill="#1a1a1a" text-anchor="middle">node:role</text>
  <text x="400" y="122" font-size="11" fill="#666" text-anchor="middle">a YAAH node, invoked directly</text>

  <rect x="305" y="140" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="400" y="162" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">build Envelope(args)</text>
  <line x1="400" y1="176" x2="400" y2="196" stroke="#444" stroke-width="1.2" marker-end="url(#arrow3)"/>

  <rect x="305" y="200" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="400" y="222" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">node.invoke(env, cfg)</text>
  <line x1="400" y1="236" x2="400" y2="256" stroke="#444" stroke-width="1.2" marker-end="url(#arrow3)"/>

  <rect x="305" y="260" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="400" y="282" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">unwrap Envelope</text>

  <rect x="305" y="332" width="190" height="32" fill="#eef3f8" stroke="#2c3e50" stroke-width="1" rx="3"/>
  <text x="400" y="352" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">cost: low ms</text>
  <text x="400" y="386" font-size="10" fill="#666" text-anchor="middle">envelope wrap, no Comms routing</text>
  <text x="400" y="402" font-size="10" fill="#666" text-anchor="middle">use for: shell, http, mcp_tool, render</text>

  <!-- COLUMN 3: mcp_tool -->
  <rect x="530" y="80" width="230" height="340" fill="#f7f9fb" stroke="#2c3e50" stroke-width="1.5" rx="4"/>
  <text x="645" y="104" font-size="13" font-weight="700" font-family="monospace" fill="#1a1a1a" text-anchor="middle">node:mcp_xxx</text>
  <text x="645" y="122" font-size="11" fill="#666" text-anchor="middle">an MCP-server-backed node</text>

  <rect x="550" y="140" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="645" y="162" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">McpToolNode.invoke</text>
  <line x1="645" y1="176" x2="645" y2="196" stroke="#444" stroke-width="1.2" marker-end="url(#arrow3)"/>

  <rect x="550" y="200" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="645" y="222" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">JSON-RPC tools/call</text>
  <line x1="645" y1="236" x2="645" y2="256" stroke="#444" stroke-width="1.2" marker-end="url(#arrow3)"/>

  <rect x="550" y="260" width="190" height="36" fill="#ffffff" stroke="#999" stroke-width="1" rx="3"/>
  <text x="645" y="282" font-size="11" font-family="monospace" fill="#1a1a1a" text-anchor="middle">over held connection</text>

  <rect x="550" y="332" width="190" height="32" fill="#eef3f8" stroke="#2c3e50" stroke-width="1" rx="3"/>
  <text x="645" y="352" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">cost: network-bound</text>
  <text x="645" y="386" font-size="10" fill="#666" text-anchor="middle">connection held per session</text>
  <text x="645" y="402" font-size="10" fill="#666" text-anchor="middle">use for: external services, MCP servers</text>

  <text x="40" y="445" font-size="10" fill="#999">Author chooses per tool. All three coexist in one catalog: tools: { read_file: "fn:fs:read", search: "node:mcp_linear" }</text>

</svg>
